on:
  pull_request:
    types: [opened, synchronize, reopened]
name: PR Unit Tests
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - uses: extractions/setup-just@v1
      - uses: actions/setup-go@v4
      - name: Run Unit Tests
        run: just test
